services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    ports:
      - '8085:8080'
    volumes:
      - /srv/docker/volumes/stirling-pdf/configs:/configs
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - SECURITY_ENABLE_LOGIN=false
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
