services:
  penpot-frontend:
    container_name: penpot-frontend
    image: penpotapp/frontend:latest
    restart: unless-stopped
    ports:
      - "9001:8080"
    volumes:
      - /srv/docker/volumes/penpot/assets:/opt/data/assets
    depends_on:
      - penpot-backend
      - penpot-exporter
    environment:
      PENPOT_FLAGS: ${PENPOT_FLAGS}
      PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 31457280
      PENPOT_HTTP_SERVER_MAX_MULTIPART_BODY_SIZE: 367001600
    networks:
      - dokploy-network

  penpot-backend:
    container_name: penpot-backend
    image: penpotapp/backend:latest
    restart: unless-stopped
    volumes:
      - /srv/docker/volumes/penpot/assets:/opt/data/assets
    depends_on:
      penpot-valkey:
        condition: service_healthy
    environment:
      PENPOT_FLAGS: ${PENPOT_FLAGS}
      PENPOT_PUBLIC_URI: ${PENPOT_PUBLIC_URI}
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}
      PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 31457280
      PENPOT_HTTP_SERVER_MAX_MULTIPART_BODY_SIZE: 367001600
      PENPOT_DATABASE_URI: ${PENPOT_DATABASE_URI}
      PENPOT_DATABASE_USERNAME: ${PENPOT_DATABASE_USERNAME}
      PENPOT_DATABASE_PASSWORD: ${PENPOT_DATABASE_PASSWORD}
      PENPOT_REDIS_URI: ${PENPOT_REDIS_URI}
      PENPOT_ASSETS_STORAGE_BACKEND: assets-fs
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: false
    networks:
      - dokploy-network

  penpot-exporter:
    container_name: penpot-exporter
    image: penpotapp/exporter:latest
    restart: unless-stopped
    depends_on:
      penpot-valkey:
        condition: service_healthy
    environment:
      PENPOT_PUBLIC_URI: http://penpot-frontend:8080
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}
      PENPOT_REDIS_URI: ${PENPOT_REDIS_URI}
    networks:
      - dokploy-network

  penpot-valkey:
    container_name: penpot-valkey
    image: valkey/valkey:8.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 3s
    environment:
      - VALKEY_EXTRA_FLAGS=--maxmemory 128mb --maxmemory-policy volatile-lfu
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
    name: dokploy-network
