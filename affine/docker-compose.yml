name: affine
services:
  affine:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_server
    ports:
      - '${PORT:-3010}:3010'
    depends_on:
      affine_migration:
        condition: service_completed_successfully
    volumes:
      - /srv/docker/volumes/affine/storage:/root/.affine/storage
      - /srv/docker/volumes/affine/config:/root/.affine/config
    env_file:
      - .env
    environment:
      - REDIS_SERVER_HOST=affine_valkey
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_DATABASE:-affine}
      - AFFINE_SERVER_HOST=${AFFINE_SERVER_HOST}
      - AFFINE_SERVER_HTTPS=${AFFINE_SERVER_HTTPS}
      - AFFINE_INDEXER_ENABLED=${AFFINE_INDEXER_ENABLED}
    restart: unless-stopped
    networks:
      - dokploy-network

  affine_migration:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_migration_job
    volumes:
      - /srv/docker/volumes/affine/storage:/root/.affine/storage
      - /srv/docker/volumes/affine/config:/root/.affine/config
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    env_file:
      - .env
    environment:
      - REDIS_SERVER_HOST=affine_valkey
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=${AFFINE_INDEXER_ENABLED}
    networks:
      - dokploy-network

  affine_valkey:
    image: valkey/valkey:8.1
    container_name: affine_valkey
    healthcheck:
      test: ['CMD', 'valkey-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
